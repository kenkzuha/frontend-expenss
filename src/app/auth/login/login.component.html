<app-auth-layout>
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your Expenss account</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <input
            id="username"
            type="text"
            class="form-input"
            [class.is-error]="username.invalid && username.touched"
            formControlName="username"
            placeholder="username"
            autocomplete="username"
          />
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="field-error" *ngIf="username.invalid && username.touched">
          {{ username.errors?.['required'] ? 'Username is required.' : 'At least 3 characters.' }}
        </span>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label class="form-label" for="password">Password</label>
          <a class="forgot" routerLink="/forgot-password">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            [class.is-error]="password.invalid && password.touched"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="field-error" *ngIf="password.invalid && password.touched">
          {{ password.errors?.['required'] ? 'Password is required.' : 'At least 8 characters.' }}
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign in</span>
        <span *ngIf="isLoading" class="spinner" aria-label="Signing in..."></span>
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/signup">Sign up</a>
    </p>
  </div>
</app-auth-layout>
