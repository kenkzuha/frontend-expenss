<div class="modal-backdrop" (click)="onBackdropClick($event)" *transloco="let t">
  <div class="modal">

    <div class="modal-header">
      <h2 class="modal-title">{{ t('dashboard.addExpense') }}</h2>
      <button class="modal-close" (click)="close.emit()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="field">
        <label class="field-label">{{ t('dashboard.form.name') }}</label>
        <input class="field-input" [class.is-error]="name.invalid && name.touched"
          type="text" formControlName="name" [placeholder]="t('dashboard.form.namePlaceholder')" autocomplete="off"/>
        <span class="field-error" *ngIf="name.invalid && name.touched">{{ t('dashboard.form.nameRequired') }}</span>
      </div>

      <div class="field">
        <label class="field-label">{{ t('dashboard.form.amount') }}</label>
        <div class="amount-wrap">
          <span class="amount-prefix">¥</span>
          <input class="field-input amount-input" [class.is-error]="amount.invalid && amount.touched"
            type="number" formControlName="amount" placeholder="0" min="1"/>
        </div>
        <span class="field-error" *ngIf="amount.invalid && amount.touched">{{ t('dashboard.form.amountRequired') }}</span>
      </div>

      <div class="field">
        <label class="field-label">{{ t('dashboard.form.category') }}</label>
        <div class="cat-grid">
          <button *ngFor="let cat of categories" type="button"
            class="cat-btn"
            [class.active]="category.value === cat.key"
            [class]="'cat-btn cat-btn--' + cat.key + (category.value === cat.key ? ' active' : '')"
            (click)="selectCategory(cat.key)">
            <svg *ngIf="cat.key==='food'"          width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
            <svg *ngIf="cat.key==='housing'"       width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <svg *ngIf="cat.key==='transport'"     width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M9 19l-2 3M15 19l2 3M9 12h6M12 3v4"/><circle cx="9" cy="14" r="1" fill="currentColor"/><circle cx="15" cy="14" r="1" fill="currentColor"/></svg>
            <svg *ngIf="cat.key==='shopping'"      width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <svg *ngIf="cat.key==='health'"        width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <svg *ngIf="cat.key==='entertainment'" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg *ngIf="cat.key==='education'"     width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <svg *ngIf="cat.key==='other'"         width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>{{ t(cat.labelKey) }}</span>
          </button>
        </div>
        <span class="field-error" *ngIf="category.invalid && category.touched">{{ t('dashboard.form.categoryRequired') }}</span>
      </div>

      <div class="field">
        <label class="field-label">{{ t('dashboard.form.date') }}</label>
        <input class="field-input" type="date" formControlName="date"/>
      </div>

      <div class="field">
        <label class="field-label">
          {{ t('dashboard.form.note') }}
          <span class="optional">{{ t('dashboard.form.optional') }}</span>
        </label>
        <input class="field-input" type="text" formControlName="note"
          [placeholder]="t('dashboard.form.notePlaceholder')" autocomplete="off"/>
      </div>


      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="close.emit()">{{ t('dashboard.form.cancel') }}</button>
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">{{ t('dashboard.form.save') }}</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>
