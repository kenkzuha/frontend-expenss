<section class="features">
  <div class="section-label">{{ 'features.sectionLabel' | transloco }}</div>
  <h2 class="section-heading">{{ 'features.heading' | transloco }}<br />{{ 'features.headingLine2' | transloco }}</h2>
  <p class="section-body">
    {{ 'features.description' | transloco }}
  </p>

  <div class="features-grid">
    <div *ngFor="let feat of features" class="feat-card">
      <div class="feat-icon">
        <ng-container [ngSwitch]="feat.icon">
          <svg *ngSwitchCase="'chart'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <svg *ngSwitchCase="'yen'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20V12M12 12L5 4M12 12L19 4M5 9h14M5 14h14"/></svg>
          <svg *ngSwitchCase="'target'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          <svg *ngSwitchCase="'receipt'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8H8M16 12H8M12 16H8"/></svg>
        </ng-container>
      </div>
      <div class="feat-title">{{ feat.titleKey | transloco }}</div>
      <div class="feat-desc">{{ feat.descKey | transloco }}</div>
    </div>
  </div>
</section>
