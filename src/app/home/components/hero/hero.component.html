<section class="hero">

  <div class="hero-logo">Expen<span class="hero-logo-accent">ss</span></div>

  <h1>
    {{ 'hero.title' | transloco }}<br />
    <span class="muted">{{ 'hero.titleMuted' | transloco }}</span>
  </h1>

  <p>{{ 'hero.description' | transloco }}</p>

  <div class="actions">
    <a class="btn-primary" routerLink="/signup">
      {{ 'hero.startForFree' | transloco }}
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

  <p class="hero-trust">{{ 'hero.trustNote' | transloco }}</p>

</section>
